<!-- templates/publisher_edit.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Comic | Publisher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="dashboard-wrapper">
    <!-- Top Bar -->
    <header class="dashboard-header">
        <h1>CBRP</h1>
        <div class="header-right">
            <span>{{ user_name }}</span>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </header>

    <!-- Page Title -->
    <div class="page-title">
        <h2>Edit Comic</h2>
        <p><a href="/publisher_home">&larr; Back to Dashboard</a></p>
    </div>

    <!-- Edit Form -->
    <div class="create-form-card">
        <form method="POST" action="/publisher/edit/{{ comic.id }}" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" value="{{ comic.title }}" required>
                </div>
                <div class="form-group">
                    <label for="genre">Genre</label>
                    <input type="text" name="genre" id="genre" value="{{ comic.genre or '' }}">
                </div>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" name="description" id="description" value="{{ comic.description or '' }}">
            </div>
            <div class="form-group">
                <label for="poster">Poster Image</label>
                {% if comic.poster_url %}
                <div class="poster-preview">
                    <img src="{{ image_url(comic.poster_url) }}" alt="Current poster" class="preview-img">
                    <small>Current poster — upload a new file to replace</small>
                </div>
                {% endif %}
                <input type="file" name="poster" id="poster" accept="image/*" class="file-input">
            </div>
            <div class="form-group">
                <label for="status">Status</label>
                <select name="status" id="status">
                    <option value="draft" {{ 'selected' if comic.status == 'draft' }}>Draft</option>
                    <option value="published" {{ 'selected' if comic.status == 'published' }}>Published</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Save Changes</button>
        </form>
    </div>
</div>

</body>
</html>
